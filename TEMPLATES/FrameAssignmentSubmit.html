<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Submit Assignment</title>
  <link rel="stylesheet" href="../CSS/theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <script type="module">
    // Load supabase globally so navigation fragment can use it
    import { supabase } from '../JS/supabase-auth.js';
    window.supabase = supabase;
    console.log('Supabase loaded globally');
  </script>

  <script type="module" src="../JS/auth.js"></script>
  
  <script type="module">
    import { loadNavigation } from '../JS/navigation-loader.js';
    
    loadNavigation('nav-container').then(() => {
      // Navigation loaded
    });
  </script>

  <main class="max-w-3xl mx-auto p-6">
    <div class="bg-white p-6 rounded shadow">
      <h1 class="text-2xl font-bold mb-4">Submit Assignment</h1>

      <form id="submitForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Assignment</label>
          <div id="assignmentRef" class="mt-1 text-sm text-gray-600">Loading...</div>
        </div>

        <div>
          <label for="submissionText" class="block text-sm font-medium text-gray-700">Notes / Text</label>
          <textarea id="submissionText" rows="6" class="mt-1 block w-full border rounded p-2" placeholder="Write any notes for your submission..."></textarea>
        </div>

        <div>
          <label for="submissionUrl" class="block text-sm font-medium text-gray-700">External link (optional)</label>
          <input id="submissionUrl" type="url" class="mt-1 block w-full border rounded p-2" placeholder="https://...">
        </div>

        <div>
          <label for="submissionFiles" class="block text-sm font-medium text-gray-700">Attachments (optional)</label>
          <input id="submissionFiles" type="file" multiple class="mt-1 block w-full" />
          <div id="fileList" class="mt-2 text-sm text-gray-600">No files selected.</div>
        </div>

        <div class="flex items-center gap-3">
          <button id="btnSubmit" type="button" class="px-4 py-2 bg-green-600 text-white rounded">Submit</button>
          <button id="btnCancel" type="button" class="px-4 py-2 bg-gray-200 rounded">Cancel</button>
        </div>

        <div id="submitStatus" class="text-sm mt-2"></div>
      </form>
    </div>
  </main>

  <script type="module" src="../JS/assignmentsubmit.js"></script>
</body>
</html>
