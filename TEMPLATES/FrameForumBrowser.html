<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Forum</title>
  <link rel="icon" href="/IMAGES/favicon.png" type="image/png">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/forumbrowser.css">
  <link rel="stylesheet" href="/CSS/games-layout.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/JS/auth.js"></script>
</head>
<body>
  <script type="module">
    import { supabase } from '/JS/supabase-auth.js';
    window.supabase = supabase;
    console.log('Supabase loaded globally');
  </script>

  <!-- Navigation Container -->
  <div id="nav-container"></div>
  <script type="module">
    import { loadNavigation } from '/JS/navigation-loader.js';
    loadNavigation('nav-container').then(() => { setupLogout(); });

    function setupLogout() {
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async function(e) {
          e.preventDefault();
          if (!window.supabase) {
            alert('Supabase not available');
            return;
          }
          try {
            const { error } = await window.supabase.auth.signOut();
            if (error) {
              alert('Failed to log out');
              return;
            }
            window.location.href = '/TEMPLATES/FrameLogin.html';
          } catch (err) {
            alert('Error logging out');
          }
        });
      }
    }
  </script>
<!-- Main Content -->
<main class="main-content">
  <div class="forum-container">
    <!-- Page Title -->
    <div class="page-title">
      <h1>Forum</h1>
      <p>Discuss with your classmates and instructors</p>
    </div>

    <!-- Controls Section -->
    <div class="forum-controls">
      <div class="search-and-filter">
        <div class="search-box">
          <i data-lucide="search"></i>
          <input id="searchThreads" placeholder="Search threads..." class="search-input">
        </div>
        <select id="filterClass" class="filter-select">
          <option value="">All classes</option>
        </select>
      </div>
      <div class="control-buttons">
        <button id="btnNewThread" class="btn-primary">
          <i data-lucide="plus"></i>
          New Thread
        </button>
        <div class="thread-count">Threads: <span id="threadCount">0</span></div>
      </div>
    </div>

    <!-- Forum Layout -->
    <div class="forum-layout">
      <!-- Threads List Section -->
      <section class="threads-section">
        <div class="section-title">Threads</div>
        <div id="threadsList" class="threads-list"></div>
      </section>

      <!-- Thread View Section -->
      <section class="thread-content-section">
        <div id="threadView" class="thread-view">
          <div id="threadPlaceholder" class="thread-placeholder">
            <i data-lucide="message-square"></i>
            <p>Select a thread to view posts</p>
            <span>or create a new thread to start a discussion</span>
          </div>
        </div>
      </section>
    </div>

    <!-- New Thread Modal -->
    <div id="newThreadArea" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Create New Thread</h3>
          <button id="cancelCreateThread" class="modal-close" aria-label="Close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="newThreadClass">Class</label>
            <select id="newThreadClass" class="form-input"></select>
          </div>
          <div class="form-group">
            <label for="newThreadTitle">Title</label>
            <input id="newThreadTitle" type="text" class="form-input" placeholder="Thread title">
          </div>
          <div class="form-group">
            <label for="newThreadBody">Message</label>
            <textarea id="newThreadBody" rows="6" class="form-input" placeholder="Your message"></textarea>
          </div>
          <div id="createThreadStatus" class="status-message"></div>
        </div>
        <div class="modal-footer">
          <button id="createThreadBtn" class="btn-primary">Create Thread</button>
          <button id="cancelCreateThread-footer" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</main>

  <script type="module" src="/JS/forumbrowser.js"></script>
</body>
</html>
