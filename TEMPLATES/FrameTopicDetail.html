<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Topic Detail</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/CSS/games-layout.css">
  <link rel="stylesheet" href="/CSS/classdetail.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/JS/auth.js"></script>
  <style>
    .topic-detail-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    .topic-breadcrumb {
      margin-bottom: 2rem;
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    .topic-breadcrumb a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .topic-breadcrumb a:hover {
      text-decoration: underline;
    }

    .topic-detail-header {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      border: 1px solid var(--border-color);
    }

    .topic-detail-header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin: 0 0 1rem 0;
      color: var(--text-primary);
    }

    .topic-detail-header .class-info {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .topic-detail-header .topic-meta-badge {
      display: inline-block;
      background: rgba(255, 107, 53, 0.1);
      color: var(--primary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .topic-section {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      border: 1px solid var(--border-color);
    }

    .section-title {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 0 0 1rem 0;
      color: var(--text-primary);
    }

    .topic-description-text {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .topic-content-text {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.8;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .image-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .gallery-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }

    .gallery-item:hover {
      box-shadow: 0 8px 24px rgba(255, 107, 53, 0.15);
      border-color: var(--primary);
    }

    .gallery-image-wrapper {
      position: relative;
      aspect-ratio: 16 / 10;
      background: var(--bg-light);
      overflow: hidden;
    }

    .gallery-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }

    .gallery-overlay-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .gallery-overlay-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }

    .gallery-info {
      padding: 1rem;
      background: white;
    }

    .gallery-title {
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 0.25rem 0;
      font-size: 0.9375rem;
    }

    .gallery-desc {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin: 0;
      line-height: 1.4;
    }

    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .file-item {
      background: var(--bg-light);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
      text-decoration: none;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .file-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.1);
      color: var(--primary);
    }

    .file-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 0.75rem;
      color: var(--primary);
    }

    .file-icon svg {
      width: 100%;
      height: 100%;
    }

    .file-name {
      font-weight: 600;
      font-size: 0.875rem;
      word-break: break-word;
    }

    .empty-resources {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }

    .empty-resources-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      color: var(--border-color);
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      margin-bottom: 1rem;
    }

    .back-button:hover {
      background: var(--primary-dark);
      transform: translateX(-2px);
    }

    @media (max-width: 768px) {
      .topic-detail-container {
        padding: 1rem;
      }

      .topic-detail-header {
        padding: 1.5rem;
        margin-bottom: 1rem;
      }

      .topic-detail-header h1 {
        font-size: 1.5rem;
      }

      .topic-section {
        padding: 1.5rem;
        margin-bottom: 1rem;
      }

      .section-title {
        font-size: 1.125rem;
      }

      .image-gallery {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1rem;
      }

      .files-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <script type="module">
    import { supabase } from '/JS/supabase-auth.js';
    window.supabase = supabase;
  </script>

  <div id="nav-container"></div>

  <script type="module">
    import { loadNavigation } from '/JS/navigation-loader.js';
    
    loadNavigation('nav-container').then(() => {
      // Navigation loaded
    });
  </script>

  <main class="main-content">
    <div class="topic-detail-container">
      <a href="#" id="backLink" class="back-button">
        <i data-lucide="arrow-left"></i>
        Back to Class
      </a>

      <div class="topic-breadcrumb">
        <a href="#" id="classLink">Class Name</a> <span>/</span> <span id="topicBreadcrumb">Topic</span>
      </div>

      <!-- Topic Header -->
      <div class="topic-detail-header">
        <h1 id="topicTitle">Topic Title</h1>
        <div class="class-info">
          Class: <strong id="className">—</strong>
        </div>
        <span class="topic-meta-badge">Educational Content</span>
      </div>

      <!-- Description Section -->
      <div id="descriptionSection" class="topic-section" style="display: none;">
        <h2 class="section-title">Description</h2>
        <p id="topicDescription" class="topic-description-text"></p>
      </div>

      <!-- Content Section -->
      <div id="contentSection" class="topic-section" style="display: none;">
        <h2 class="section-title">Content</h2>
        <p id="topicContent" class="topic-content-text"></p>
      </div>

      <!-- Images Section -->
      <div id="imagesSection" class="topic-section" style="display: none;">
        <h2 class="section-title">Images</h2>
        <div id="imageGallery" class="image-gallery"></div>
      </div>

      <!-- Documents Section -->
      <div id="documentsSection" class="topic-section" style="display: none;">
        <h2 class="section-title">Documents & Files</h2>
        <div id="filesGrid" class="files-grid"></div>
      </div>

      <!-- No Resources -->
      <div id="noResourcesSection" class="topic-section empty-resources" style="display: none;">
        <div class="empty-resources-icon">
          <i data-lucide="inbox"></i>
        </div>
        <p>No resources have been added to this topic yet.</p>
      </div>
    </div>
  </main>

  <script type="module" src="/JS/topicdetail.js"></script>
</body>
</html>
