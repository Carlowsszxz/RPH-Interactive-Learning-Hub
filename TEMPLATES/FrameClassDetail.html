<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Class Detail</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/CSS/games-layout.css">
  <link rel="stylesheet" href="/CSS/classdetail.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/JS/auth.js"></script>
</head>
<body>
  <script type="module">
    import { supabase } from '/JS/supabase-auth.js';
    window.supabase = supabase;
  </script>

  <div id="nav-container"></div>
  
  <script type="module">
    import { loadNavigation } from '/JS/navigation-loader.js';
    
    loadNavigation('nav-container').then(() => {
      // Navigation loaded
    });
  </script>

  <main class="main-content">
    <div class="class-detail-container">
      <div class="class-header">
        <div class="header-top">
          <div class="header-title-group">
            <h1 id="className" class="class-title">Class Name</h1>
            <div class="class-meta">
              <span>Code: <span id="classCode">—</span></span>
              <span>Instructor: <span id="classInstructorName">—</span></span>
            </div>
          </div>
          <div id="statusBadge" class="header-badge"></div>
        </div>
      </div>

      <div class="class-stats">
        <div class="stat-card">
          <div class="stat-label">Students</div>
          <div id="statStudents" class="stat-number">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Topics</div>
          <div id="statTopics" class="stat-number">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Activities</div>
          <div id="statActivities" class="stat-number">0</div>
        </div>
      </div>

      <div class="class-content-grid">
        <article class="class-main-content">
          <section class="content-card">
            <h2 class="card-title">Course Description</h2>
            <p id="classDesc" class="card-text">Description will appear here.</p>
          </section>

          <section class="content-card">
            <h2 class="card-title">Topics & Resources</h2>
            <div id="topicsContainer" class="topics-container"></div>
          </section>

          <section class="content-card">
            <h2 class="card-title">Recent Activities</h2>
            <ul id="recentActivities" class="activities-list"></ul>
          </section>

          <section class="content-card">
            <h2 class="card-title">Forum Preview</h2>
            <div id="forumPreview" class="forum-preview">Loading...</div>
            <div class="mt-3">
              <a href="#" id="viewFullForum" class="link-action">View Full Forum →</a>
            </div>
          </section>

          <div class="action-buttons">
            <button id="btnEnroll" class="btn-primary">
              <i data-lucide="user-plus"></i>
              Enroll
            </button>
            <button id="btnUnenroll" class="btn-secondary">
              <i data-lucide="user-minus"></i>
              Unenroll
            </button>
            <button id="btnActivities" class="btn-secondary">
              <i data-lucide="list"></i>
              View All Activities
            </button>
            <button id="btnForum" class="btn-secondary">
              <i data-lucide="message-square"></i>
              Go to Forum
            </button>
          </div>
        </article>

        <aside class="class-sidebar">
          <div id="instructorCard" class="instructor-card">
            <div class="instructor-avatar" id="instructorAvatar"></div>
            <div class="instructor-info">
              <div class="instr-name">Instructor Name</div>
              <div class="instr-bio" style="margin-top: 0.75rem;">Bio will appear here.</div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script type="module" src="/JS/classdetail-data.js"></script>
  <script type="module" src="/JS/classdetail.js"></script>
</body>
</html>
