<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up</title>
  <link rel="stylesheet" href="../CSS/theme.css">
  <link rel="stylesheet" href="../CSS/signup.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="login-container">
    <form id="signupForm" class="login-form" action="#" method="post" novalidate>
      <h1 class="login-title">Create account</h1>

      <div id="alertContainer"></div>

      <div class="input-group">
        <label for="fullname">Full name</label>
        <input id="fullname" name="fullname" type="text" required autocomplete="name">
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email">
      </div>

      <div class="input-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autocomplete="username">
      </div>

      <div class="input-group">
        <label for="studentId">Student ID</label>
        <input id="studentId" name="studentId" type="text" placeholder="e.g. 2023-0001" autocomplete="off">
      </div>

      <div class="input-group with-trailing-icon">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="new-password">
        <button type="button" class="password-toggle" id="passwordToggle" title="Show/hide password">
          <i data-lucide="eye"></i>
        </button>
      </div>
      <div class="password-strength" id="strengthMeter">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <span class="strength-text" id="strengthText"></span>
      </div>

      <div class="input-group with-trailing-icon">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" required autocomplete="new-password">
        <button type="button" class="password-toggle" id="confirmPasswordToggle" title="Show/hide password">
          <i data-lucide="eye"></i>
        </button>
      </div>

      <div class="input-group">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>

      <div class="options">
        <label class="terms"><input type="checkbox" id="terms" name="terms"> I agree to the terms</label>
      </div>

      <button type="submit" id="signupBtn" class="btn">Sign up</button>

      <p class="form-foot">Already have an account? <a href="FrameLogin.html">Log in</a></p>
    </form>

  <script type="module" src="../JS/signup.js"></script>
</body>
</html>
