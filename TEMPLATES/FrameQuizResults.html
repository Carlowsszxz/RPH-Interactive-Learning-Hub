<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quiz Results</title>
  <link rel="stylesheet" href="../CSS/theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <script type="module">
    // Load supabase globally so navigation fragment can use it
    import { supabase } from '../JS/supabase-auth.js';
    window.supabase = supabase;
    console.log('Supabase loaded globally');
  </script>

  <script type="module" src="../JS/auth.js"></script>

  <div id="nav-container"></div>
  <script type="module">
    import { loadNavigation } from '../JS/navigation-loader.js';
    
    loadNavigation('nav-container').then(() => {
      setupLogout();
    });

    function setupLogout() {
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async function(e) {
          e.preventDefault();
          if (!window.supabase) {
            alert('Supabase not available');
            return;
          }
          try {
            const { error } = await window.supabase.auth.signOut();
            if (error) {
              alert('Failed to log out');
              return;
            }
            window.location.href = '/TEMPLATES/FrameLogin.html';
          } catch (err) {
            alert('Error logging out');
          }
        });
      }
      const signOut = document.getElementById('signOut');
      if (signOut) {
        signOut.addEventListener('click', async function(e) {
          e.preventDefault();
          if (!window.supabase) {
            alert('Supabase not available');
            return;
          }\n          try {\n            const { error } = await window.supabase.auth.signOut();\n            if (error) {\n              alert('Failed to log out');\n              return;\n            }\n            window.location.href = '/TEMPLATES/FrameLogin.html';\n          } catch (err) {\n            alert('Error logging out');\n          }\n        });\n      }\n    }\n  </script>
  </script>

  <main class="max-w-4xl mx-auto p-6">
    <header class="flex items-start justify-between mb-6">
      <div>
        <h1 id="quizTitle" class="text-2xl font-bold">Quiz Results</h1>
        <div id="quizMeta" class="text-sm text-gray-600">Loading...</div>
      </div>
      <div class="text-right">
        <div class="text-sm">Score</div>
        <div id="scoreBox" class="text-2xl font-semibold">—</div>
        <div id="percentBox" class="text-sm text-gray-600">—</div>
      </div>
    </header>

    <section class="bg-white p-4 rounded shadow mb-4">
      <h2 class="font-semibold mb-2">Attempt Summary</h2>
      <div id="attemptSummary" class="text-sm text-gray-700">Loading...</div>
    </section>

    <section class="bg-white p-4 rounded shadow mb-4">
      <h2 class="font-semibold mb-2">Question Breakdown</h2>
      <div id="questionList" class="space-y-3 text-sm text-gray-800">Loading...</div>
    </section>

    <section class="bg-white p-4 rounded shadow">
      <h2 class="font-semibold mb-2">Top Attempts</h2>
      <div id="topAttempts" class="text-sm text-gray-700">Loading...</div>
    </section>
  </main>

  <script type="module" src="../JS/quizresults.js"></script>
</body>
</html>
